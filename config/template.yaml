# GitBrain Configuration Template
# Copy to ~/.hermes/gitbrain.yaml and customize

# Git repository URL (required)
repo_url: https://github.com/your-username/your-gitbrain.git

# Device identifier (must be unique per device)
# Examples: pc-win, macbook, server-linux, phone-android
device_id: my-device

# Auto sync settings
auto_pull: true    # Pull on Agent startup
auto_push: true    # Push on Memory/Skill change

# Sync interval in seconds (for background sync)
sync_interval: 300  # 5 minutes

# Directories to sync
sync:
  skills: true
  memories: true
  config: false  # Usually device-specific

# Conflict resolution strategy
# Options: timestamp (latest wins), device-priority, manual
conflict_strategy: timestamp

# Device priority (used when conflict_strategy = device-priority)
# Higher number = higher priority
device_priority:
  pc-win: 10
  macbook: 10
  server-linux: 5
  phone-android: 1
